version: '3.8'

services:
  postgres:
    # Mesmo major da producao (Railway roda postgres-ssl:18). Manter igual e o
    # que permite restaurar dumps de prod aqui e testar migrations com fidelidade.
    image: postgres:18-alpine
    container_name: masar-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: masar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
